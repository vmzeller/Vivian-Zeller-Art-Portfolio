<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome to my Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Bubblegum', sans-serif;
      background-color: #f7b2b4;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding-top: 40px;
    }

    header {
      background-color: #f06674;
      width: 100%;
      text-align: center;
      padding: 30px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    header h1 {
      font-family: 'Pacifico', cursive;
      font-size: 3.2rem;
      margin: 0;
      color: white;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
    }

    .content {
      text-align: center;
      padding: 30px;
      max-width: 650px;
      background-color: #f3888a;
      border: 3px dashed white;
      border-radius: 25px;
      margin: 25px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    }

    .content p {
      font-size: 1.4rem;
      line-height: 1.8;
      margin-bottom: 20px;
    }

    .cute-button {
      margin-top: 10px;
      background-color: #fff;
      border: 2px solid #ffffff;
      color: #f06674;
      padding: 14px 28px;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
      font-family: 'Quicksand', sans-serif;
    }

    .cute-button:hover {
      background-color: #f06674;
      color: white;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <header>
    <h1> ❤︎ Vivian Zeller's Art Portfolio ❤︎ </h1>
  </header> 

  <div class="content">
    <p>This is my portfolio for all of my cool art pieces I've done over the years!</p>
    <button class="cute-button" onclick="window.location.href='page2.html'">Portfolio ➜</button>
  </div>

  <div class="content">
    <p>This is all about me!</p>
    <button class="cute-button" onclick="window.location.href='About Me.html'">Bio ➜</button>
  </div>

</body>
</html>
