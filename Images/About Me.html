<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Bubblegum', sans-serif;
      background-color: #f7b2b4;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background-color: #f06674;
      width: 100%;
      text-align: center;
      padding: 30px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    header h1 {
      font-family: 'Pacifico', cursive;
      font-size: 2.8rem;
      margin: 0;
      color: white;
    }

    .content {
      text-align: center;
      padding: 40px;
      max-width: 600px;
      margin: 0 auto;
    }

    .spacer {
      flex: 1;
    }

    .cute-button {
      background-color: #f3888a;
      border: none;
      color: white;
      padding: 12px 24px;
      font-size: 1rem;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      transition: background-color 0.3s;
      align-self: center;
      margin-bottom: 30px;
    }

    .cute-button:hover {
      background-color: #f06674;
    }
  </style>
</head>
<body>

  <header>
    <h1> ❤︎ Biography ❤︎ </h1>
  </header>

  <div class="content">
    <p>This is where my biography content would go.</p>
  </div>

  <div class="spacer"></div> <!-- pushes button to bottom -->

  <button class="cute-button" onclick="window.location.href='Art Portfolio.html'">Back</button>

</body>
</html>
